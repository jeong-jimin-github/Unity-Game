name: Automated Build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  buildWindows:
    name: Windows-64 Bit
    runs-on: windows-latest

    steps:
      - name: Clone repository
        run: |
          # http를 https로 변경하고, 인증 안정성을 위해 oauth2를 사용합니다.
          git clone --depth 1 --branch main https://oauth2:${{ secrets.GIT_TOKEN }}@${{ secrets.GIT_URL }} source
          cd source
          git lfs pull

      - uses: actions/cache@v4
        with:
          path: source/Library
          key: Library-${{ hashFiles('source/Assets/**', 'source/Packages/**', 'source/ProjectSettings/**') }}
          restore-keys: |
            Library-

      - name: Build project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          allowDirtyBuild: true
          projectPath: source
          targetPlatform: StandaloneWindows64

      - name: Check build output
        run: dir Build

      - name: Download and extract llama.cpp (Windows)
        run: |
          $ReleaseUrl = "https://api.github.com/repos/ggml-org/llama.cpp/releases/latest"
          $Release = Invoke-RestMethod -Uri $ReleaseUrl
          $Asset = $Release.assets | Where-Object { $_.name -match "llama-.*-bin-win-vulkan-x64\.zip" }
          
          if (-not $Asset) { 
            Write-Error "llama.cpp Windows release asset not found."
            exit 1 
          }
          
          Write-Host "Downloading $($Asset.name) from $($Asset.browser_download_url)..."
          Invoke-WebRequest -Uri $Asset.browser_download_url -OutFile "llama-win.zip"
          
          # Unity 빌드 폴더 최상단에 압축 해제
          Expand-Archive -Path "llama-win.zip" -DestinationPath "Build/StandaloneWindows64" -Force
          Remove-Item "llama-win.zip"

      - name: Prepare build for release
        run: |
          cd Build/StandaloneWindows64
          Compress-Archive -Path * -DestinationPath ../../Windows-Build.zip

      - name: Check available disk space
        run: Get-PSDrive

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows Build
          path: Windows-Build.zip

  buildMac:
    name: MacOS-ARM64
    runs-on: macos-14

    steps:
      - name: Clone repository
        run: |
          # Mac 환경에서도 동일하게 https 및 oauth2 인증을 적용합니다.
          git clone --depth 1 --branch main https://oauth2:${{ secrets.GIT_TOKEN }}@${{ secrets.GIT_URL }} source
          cd source
          git lfs pull

      - uses: actions/cache@v4
        with:
          path: source/Library
          key: Library-${{ hashFiles('source/Assets/**', 'source/Packages/**', 'source/ProjectSettings/**') }}
          restore-keys: |
            Library-

      - name: Build project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          allowDirtyBuild: true
          projectPath: source
          targetPlatform: StandaloneOSX

      - name: Check build output
        run: ls -la Build

      - name: Download and extract llama.cpp (MacOS)
        run: |
          DOWNLOAD_URL=$(curl -s https://api.github.com/repos/ggml-org/llama.cpp/releases/latest | jq -r '.assets[].browser_download_url' | grep -E 'llama-.*-bin-macos-arm64\.(zip|tar\.gz)' | head -n 1)
          
          if [ -z "$DOWNLOAD_URL" ]; then 
            echo "llama.cpp MacOS release asset not found."
            exit 1 
          fi
          
          echo "Downloading $DOWNLOAD_URL..."
          curl -L "$DOWNLOAD_URL" -o llama_mac_archive
          
          if [[ "$DOWNLOAD_URL" == *".zip" ]]; then
            unzip -o llama_mac_archive -d Build/StandaloneOSX/
          else
            tar -xzf llama_mac_archive -C Build/StandaloneOSX/
          fi
          
          rm llama_mac_archive

      - name: Prepare build for release
        run: |
          cd Build/StandaloneOSX
          zip -r ../../MacOS-Build.zip *
          
      - name: Check available disk space
        run: df -h

      - name: Upload build artifact (macOS)
        uses: actions/upload-artifact@v4
        with:
          name: MacOS Build
          path: MacOS-Build.zip

  createRelease:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [buildWindows, buildMac]
    steps:
      - name: Download Windows Build
        uses: actions/download-artifact@v4
        with:
          name: Windows Build
          path: windows

      - name: Download MacOS Build
        uses: actions/download-artifact@v4
        with:
          name: MacOS Build
          path: macos

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            windows/Windows-Build.zip
            macos/MacOS-Build.zip
          tag_name: v1.0.${{ github.run_number }}
          release_name: "Release v1.0.${{ github.run_number }}"
          body: "자동 생성된 Windows 및 MacOS 빌드 (llama.cpp 최신 바이너리 포함)"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
